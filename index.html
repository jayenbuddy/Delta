<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELTA LITE SETUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #03060e;
            --card-bg: rgba(10, 15, 28, 0.6);
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-primary: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            background: #03060e;
        }

        .aurora-bg::before,
        .aurora-bg::after {
            content: "";
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(13, 148, 136, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 75% 40%, rgba(37, 99, 235, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 40% 70%, rgba(79, 70, 229, 0.2) 0%, transparent 50%);
            background-size: 100% 100%;
            mix-blend-mode: screen;
            filter: blur(15px); 
        }

        .aurora-bg::before {
            animation: auroraFlowOne 18s infinite linear;
            opacity: 0.4; 
        }

        .aurora-bg::after {
            animation: auroraFlowTwo 26s infinite linear;
            opacity: 0.3;
            filter: blur(25px) hue-rotate(30deg);
        }

        @keyframes auroraFlowOne {
            0% {
                transform: rotate(0deg) scale(1) translate(0px, 0px);
                background-size: 100% 100%;
            }
            50% {
                transform: rotate(30deg) scale(1.1) translate(30px, -40px);
                background-size: 120% 110%;
            }
            100% {
                transform: rotate(60deg) scale(1) translate(0px, 0px);
                background-size: 100% 100%;
            }
        }

        @keyframes auroraFlowTwo {
            0% { transform: rotate(180deg) scale(1.1) translateY(0px); }
            50% { transform: rotate(90deg) scale(0.95) translateY(30px) translateX(-20px); }
            100% { transform: rotate(0deg) scale(1.1) translateY(0px); }
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7);
            z-index: 1;
            animation: fadeInContainer 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInContainer {
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
            color: #ffffff;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        .btn-download-all {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .btn-download-all::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.25) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-20deg);
        }

        .btn-download-all:hover::before {
            animation: pulseShimmer 1.3s infinite linear;
        }

        .btn-download-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
        }

        @keyframes pulseShimmer {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin: 25px 0 12px 0;
            font-weight: 700;
        }

        .download-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .download-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 14px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .download-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(59, 130, 246, 0.25);
            transform: translateX(4px);
        }

        .download-item::after {
            content: "→";
            font-size: 16px;
            color: var(--text-muted);
            opacity: 0.4;
            transition: all 0.25s ease;
        }

        .download-item:hover::after {
            color: var(--accent-primary);
            opacity: 1;
            transform: translateX(2px);
        }

        @media (max-width: 480px) {
            .container { padding: 25px 20px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    </div>

    <script>
        function downloadAllFiles() {
            const links = document.querySelectorAll('.download-link');
            links.forEach((link, index) => {
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = link.href;
                    a.download = link.href.split('/').pop(); 
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }, index * 400);
            });
        }
    </script>
</body>
</html>
