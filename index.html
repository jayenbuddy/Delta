    <script>
        function downloadAllFiles() {
            // Mengambil semua elemen <a> yang memiliki class 'download-link'
            const links = document.querySelectorAll('.download-link');
            
            links.forEach((link, index) => {
                // Memberikan sedikit jeda (delay) agar browser tidak memblokir download massal
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = link.href;
                    // Mengambil nama file dari ujung URL untuk penamaan saat diunduh
                    a.download = link.href.split('/').pop(); 
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }, index * 10000); // Jeda 400 milidetik per file
            });
        }
    </script>
