    <style>
        :root {
            --bg-color: #03060e;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-primary: #3b82f6;
            --shape-bg: rgba(59, 130, 246, 0.04);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- EFEK BACKGROUND --- */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; overflow: hidden; pointer-events: none; }
        .aurora {
            position: absolute; width: 140%; height: 140%; top: -20%; left: -20%;
            background-image: radial-gradient(circle at 15% 25%, rgba(13, 148, 136, 0.2) 0%, transparent 45%),
                              radial-gradient(circle at 80% 35%, rgba(37, 99, 235, 0.2) 0%, transparent 45%);
            filter: blur(25px); mix-blend-mode: screen;
        }

        /* --- TATA LETAK --- */
        .content-wrapper { max-width: 600px; width: 100%; z-index: 1; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 38px; font-weight: 900; margin: 0 0 12px 0; color: #ffffff; }
        .subtitle { color: var(--text-muted); font-size: 14px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin: 35px 0 15px 5px; font-weight: 700; }

        /* --- LIST STYLE --- */
        .download-list { display: flex; flex-direction: column; gap: 12px; }
        .download-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 15, 28, 0.4); border: 1px solid var(--border-color);
            padding: 18px 22px; border-radius: 14px; text-decoration: none;
            color: var(--text-main); font-size: 14px; backdrop-filter: blur(10px);
            transition: all 0.25s ease;
        }
        .download-item:hover { background: rgba(10, 15, 28, 0.6); border-color: rgba(59, 130, 246, 0.3); transform: translateY(-2px); }
        .download-item::after { content: "→"; color: var(--text-muted); opacity: 0.4; }
        .download-item:hover::after { color: var(--accent-primary); opacity: 1; }
    </style>
</head>
