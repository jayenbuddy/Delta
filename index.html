<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELTA LITE SETUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #03060e; /* Gelap pekat sesuai gambar */
            --card-bg: rgba(10, 15, 28, 0.6);
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-primary: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --shape-bg: rgba(59, 130, 246, 0.04); /* Warna shape melayang samar */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* --- 1. EFEK BACKGROUND MULTI-LAYER (AURORA & TECH SHAPES) --- */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* Lapisan Aurora Redup */
        .aurora {
            position: absolute;
            width: 140%;
            height: 140%;
            top: -20%;
            left: -20%;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(13, 148, 136, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 80% 35%, rgba(37, 99, 235, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 45% 75%, rgba(79, 70, 229, 0.15) 0%, transparent 50%);
            filter: blur(25px);
            mix-blend-mode: screen;
            animation: auroraSlow 25s infinite alternate ease-in-out;
        }

        @keyframes auroraSlow {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(45deg) scale(1.1); }
        }

        /* Elemen Grafis Kotak/Bulat Melayang (Gaya Delta Web) */
        .tech-shape {
            position: absolute;
            background: var(--shape-bg);
            border: 1px solid rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(2px);
            border-radius: 12px;
            animation: floatingShapes 16s infinite ease-in-out;
        }

        /* Variasi Posisi, Ukuran, dan Kecepatan Shape */
        .shape-1 { width: 45px; height: 45px; top: 15%; left: 12%; animation-duration: 14s; }
        .shape-2 { width: 70px; height: 70px; top: 48%; right: 10%; border-radius: 18px; animation-duration: 20s; animation-delay: -3s; }
        .shape-3 { width: 55px; height: 55px; bottom: 12%; left: 25%; animation-duration: 16s; animation-delay: -7s; }
        .shape-4 { width: 35px; height: 35px; top: 20%; right: 25%; border-radius: 50%; animation-duration: 12s; } /* Bentuk Lingkaran */
        .shape-5 { width: 80px; height: 80px; bottom: 25%; right: 30%; animation-duration: 22s; animation-delay: -5s; }

        @keyframes floatingShapes {
            0% {
                transform: translateY(0px) rotate(0deg) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-35px) rotate(45deg) scale(1.05);
                opacity: 0.6;
                border-color: rgba(59, 130, 246, 0.1); /* Agak menyala di tengah jalan */
            }
            100% {
                transform: translateY(0px) rotate(90deg) scale(1);
                opacity: 0.3;
            }
        }

        /* --- CONTAINER UTAMA (GLASSMORPHISM) --- */
        .container {
            max-width: 650px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7);
            z-index: 1;
            animation: fadeInContainer 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInContainer {
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
            color: #ffffff;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        /* --- 2. TOMBOL DOWNLOAD ALL DENGAN HOVER PULSE LOOPING --- */
        .btn-download-all {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .btn-download-all::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.25) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-20deg);
        }

        .btn-download-all:hover::before {
            animation: pulseShimmer 1.3s infinite linear;
        }

        .btn-download-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
        }

        @keyframes pulseShimmer {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        /* --- LIST LINK ITEM --- */
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin: 25px 0 12px 0;
            font-weight: 700;
        }

        .download-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .download-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 14px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .download-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(59, 130, 246, 0.25);
            transform: translateX(4px);
        }

        .download-item::after {
            content: "→";
            font-size: 16px;
            color: var(--text-muted);
            opacity: 0.4;
            transition: all 0.25s ease;
        }

        .download-item:hover::after {
            color: var(--accent-primary);
            opacity: 1;
            transform: translateX(2px);
        }

        @media (max-width: 480px) {
            .container { padding: 25px 20px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

            <a class="download-link download-item" href="https://github.com/jayenbuddy/Delta/releases/download/v1/NO.MERCY.DELTA.LITE.32.BIT.07-2.725.1142.apk.apk">DELTA 7</a>

    </div>

    <script>
        function downloadAllFiles() {
            const links = document.querySelectorAll('.download-link');
            
            links.forEach((link, index) => {
                setTimeout(() => {
                    // Menggunakan window.open terbukti lebih ampuh menembus proteksi multiple-download browser
                    const downloadWindow = window.open(link.href, '_blank');
                    
                    // Menutup tab baru secara otomatis jika link langsung memicu download (khusus APK langsung)
                    if (downloadWindow) {
                        setTimeout(() => downloadWindow.close(), 1000);
                    }
                }, index * 5000); // Menjaga jeda 5 detik sesuai keinginanmu
            });
        }
    </script>
</body>
</html>
